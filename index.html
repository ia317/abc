<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ABC Fun</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; color: #fff; overflow: hidden; }
    #outer { display: flex; gap: 10px; align-items: flex-start; }
    canvas { border: 1px solid #222; display: block; position: relative; cursor: none; }
    #group-panel {
      width: 130px;
      height: 600px;
      background: linear-gradient(180deg, #0e0e12 0%, #090909 100%);
      border: 1px solid #1e1e2a;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      padding: 10px 7px 8px;
      gap: 3px;
      overflow-y: auto;
      box-shadow: 0 0 24px rgba(0,0,0,0.8);
    }
    #group-panel::-webkit-scrollbar { width: 4px; }
    #group-panel::-webkit-scrollbar-track { background: transparent; }
    #group-panel::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
    .panel-title {
      text-align: center;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #3a3a55;
      padding: 4px 0 8px;
    }
    .panel-section {
      color: #fff;
      font-size: 9px;
      font-weight: bold;
      letter-spacing: 3px;
      text-align: center;
      padding: 6px 0 4px;
      margin: 4px 0 2px;
      border-radius: 4px;
    }
    .panel-section.caps  { background: rgba(0,255,80,0.07);  color: #2a8a4a; border: 1px solid #1a3a25; }
    .panel-section.lower { background: rgba(64,170,255,0.07); color: #2a6a9a; border: 1px solid #1a2a3a; }
    .group-btn {
      background: #111118;
      border: 1px solid #22223a;
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: bold;
      padding: 7px 4px;
      cursor: pointer;
      border-radius: 6px;
      text-align: center;
      letter-spacing: 1px;
      transition: all 0.15s;
      width: 100%;
    }
    .group-btn:hover { background: #1a1a28; border-color: #666; color: #ccc; transform: translateX(1px); }
    .group-btn.active { border-color: #0f0; color: #0f0; background: rgba(0,255,0,0.09); box-shadow: 0 0 8px rgba(0,255,0,0.2); }
    .group-btn.active.round2 { border-color: #4af; color: #4af; background: rgba(64,170,255,0.09); box-shadow: 0 0 8px rgba(64,170,255,0.2); }
    .group-btn.locked { color: #282838; border-color: #161622; background: #0a0a10; cursor: not-allowed; font-size: 9px; letter-spacing: 0; transform: none; line-height: 1; padding: 5px 4px; text-align: center; }
    .group-btn.locked:hover { background: #0a0a10; border-color: #161622; color: #282838; transform: none; }
    .review-btn {
      background: #0c0b00;
      border: 1px dashed #2a2000;
      color: #3a3000;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      font-weight: bold;
      padding: 4px 4px;
      cursor: not-allowed;
      border-radius: 6px;
      text-align: center;
      width: 100%;
      transition: all 0.15s;
      margin: 1px 0;
    }
    .review-btn.unlocked {
      border-color: #886600;
      border-style: solid;
      color: #ccaa00;
      background: rgba(255,200,0,0.06);
      cursor: pointer;
    }
    .review-btn.unlocked:hover { border-color: #ffdd00; color: #ffee44; background: rgba(255,220,0,0.12); transform: translateX(1px); }
    #reset-btn {
      margin-top: auto;
      background: transparent;
      border: 1px solid #2a1010;
      color: #442222;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      font-weight: bold;
      padding: 7px 4px;
      cursor: pointer;
      border-radius: 6px;
      text-align: center;
      letter-spacing: 1px;
      width: 100%;
      transition: all 0.15s;
    }
    #reset-btn:hover { background: rgba(255,60,60,0.08); border-color: #f44; color: #f77; }
    #ui {
      position: absolute;
      top: 10px;
      right: 60px;
      display: flex;
      gap: 20px;
      font-size: 13px;
      pointer-events: none;
      background: rgba(0,0,0,0.6);
      padding: 5px 12px;
      border: 1px solid #333;
      border-radius: 5px;
    }
    #ui span { color: #aaa; }
    #ui span b { color: #0f0; }
    #overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }
    #overlay h1 { font-size: 44px; color: #0f0; text-shadow: 0 0 20px #0f0; margin-bottom: 14px; }
    #overlay .sub { font-size: 18px; color: #aaa; margin-bottom: 10px; }
    #overlay .hint { font-size: 14px; color: #555; }
    #version { position: absolute; bottom: 8px; right: 12px; font-size: 11px; color: #333; }
    #wrapper { position: relative; }
    #pause-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 38px;
      height: 38px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #444;
      border-radius: 6px;
      color: #aaa;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: border-color 0.1s, color 0.1s;
    }
    #pause-btn:hover { border-color: #0f0; color: #0f0; }
    #pause-btn.paused { border-color: #ff0; color: #ff0; }
    #mute-btn {
      position: absolute;
      top: 56px;
      right: 10px;
      width: 38px;
      height: 38px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #444;
      border-radius: 6px;
      color: #aaa;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: border-color 0.1s, color 0.1s;
    }
    #mute-btn:hover { border-color: #0f0; color: #0f0; }
    #mute-btn.muted { border-color: #f44; color: #f44; }
    #canvas-reset-btn {
      position: absolute;
      top: 102px;
      right: 10px;
      width: 38px;
      height: 38px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #442222;
      border-radius: 6px;
      color: #733;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: border-color 0.1s, color 0.1s;
    }
    #canvas-reset-btn:hover { border-color: #f44; color: #f44; }
    #user-btn {
      position: absolute;
      top: 148px;
      right: 10px;
      width: 38px;
      height: 38px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #446;
      border-radius: 6px;
      color: #88f;
      font-size: 15px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: border-color 0.1s, color 0.1s;
    }
    #user-btn:hover { border-color: #88f; color: #ccf; }
    #add-player-btn {
      position: absolute;
      top: 194px;
      right: 10px;
      width: 38px;
      height: 38px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #2a4a2a;
      border-radius: 6px;
      color: #4a8a4a;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: border-color 0.1s, color 0.1s;
      line-height: 1;
    }
    #add-player-btn:hover { border-color: #0f0; color: #0f0; }
    #user-panel {
      display: none;
      position: absolute;
      top: 148px;
      right: 56px;
      background: rgba(8,8,14,0.97);
      border: 1px solid #334;
      border-radius: 8px;
      padding: 8px;
      min-width: 160px;
      z-index: 20;
      box-shadow: 0 4px 24px rgba(0,0,0,0.9);
    }
    .up-title { font-size: 9px; letter-spacing: 3px; color: #446; padding: 2px 4px 8px; text-align: center; }
    .up-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 6px; border-radius: 5px; font-size: 12px; color: #778; gap: 6px; }
    .up-row:not(.up-current):hover { background: rgba(255,255,255,0.04); color: #aac; cursor: pointer; }
    .up-row.up-current { color: #88f; }
    .up-row span { flex: 1; }
    .up-del { background: transparent; border: none; color: #332; font-size: 14px; cursor: pointer; padding: 0 2px; line-height: 1; }
    .up-del:hover { color: #f44; }
    #add-user-row { display: flex; gap: 4px; margin-top: 8px; border-top: 1px solid #223; padding-top: 8px; }
    #new-user-input { flex: 1; background: #0e0e16; border: 1px solid #334; border-radius: 4px; color: #ccc; font-family: 'Courier New', monospace; font-size: 11px; padding: 4px 6px; outline: none; min-width: 0; }
    #new-user-input:focus { border-color: #88f; }
    #add-user-confirm { background: rgba(100,100,255,0.12); border: 1px solid #446; border-radius: 4px; color: #88f; font-size: 16px; font-weight: bold; cursor: pointer; padding: 0 8px; }
    #add-user-confirm:hover { background: rgba(100,100,255,0.25); }
  </style>
</head>
<body>
  <div id="outer">
    <div id="group-panel"></div>
    <div id="wrapper">
      <canvas id="game"></canvas>
      <div id="ui">
        <span>SCORE <b id="score">0</b></span>
        <span style="display:none"><b id="lives"></b></span>
        <span>GROUP <b id="wave">1</b></span>
      </div>
      <div id="overlay">
        <h1 id="title">ABC FUN</h1>
        <p class="sub" id="subtitle">Match the glowing letter shown at the bottom!</p>
        <p class="hint">â† â†’ to move &nbsp;|&nbsp; SPACE to launch</p>
        <br>
        <p class="sub" style="color:#0f0">Press SPACE to Start</p>
      </div>
      <button id="pause-btn" title="Pause (P)">⏸</button>
      <button id="mute-btn" title="Mute (M)">🔊</button>
      <button id="canvas-reset-btn" title="Reset to beginning">↺</button>
      <button id="user-btn" title="Switch Player">P</button>
      <button id="add-player-btn" title="Add new player">+</button>
      <div id="user-panel">
        <div class="up-title">PLAYERS</div>
        <div id="user-list"></div>
        <div id="add-user-row">
          <input id="new-user-input" placeholder="New player…" maxlength="16" />
          <button id="add-user-confirm">+</button>
        </div>
      </div>
      <div id="version">v1.0.162</div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
