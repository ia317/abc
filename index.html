<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ABC Fun</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; color: #fff; overflow: hidden; }
    #outer { display: flex; gap: 10px; align-items: flex-start; }
    canvas { border: 1px solid #222; display: block; position: relative; cursor: none; }
    #group-panel {
      width: 118px;
      height: 600px;
      background: rgba(0,0,0,0.9);
      border: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      padding: 8px 6px;
      gap: 3px;
      overflow-y: auto;
    }
    .panel-section {
      color: #444;
      font-size: 9px;
      letter-spacing: 2px;
      text-align: center;
      padding: 5px 0 3px;
      border-bottom: 1px solid #1e1e1e;
      margin-bottom: 1px;
    }
    .group-btn {
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      color: #666;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: bold;
      padding: 7px 4px;
      cursor: pointer;
      border-radius: 5px;
      text-align: center;
      letter-spacing: 2px;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      width: 100%;
    }
    .group-btn:hover { background: #181818; border-color: #555; color: #ccc; }
    .group-btn.active { border-color: #0f0; color: #0f0; background: rgba(0,255,0,0.07); }
    .group-btn.active.round2 { border-color: #4af; color: #4af; background: rgba(64,170,255,0.07); }
    .group-btn.locked { color: #2a2a2a; border-color: #181818; background: #080808; cursor: not-allowed; font-size: 9px; letter-spacing: 1px; }
    .group-btn.locked:hover { color: #2a2a2a; border-color: #181818; background: #080808; }
    #reset-btn {
      margin-top: auto;
      background: #0d0d0d;
      border: 1px solid #3a1a1a;
      color: #633;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      font-weight: bold;
      padding: 7px 4px;
      cursor: pointer;
      border-radius: 5px;
      text-align: center;
      letter-spacing: 1px;
      width: 100%;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }
    #reset-btn:hover { background: #1a0808; border-color: #f44; color: #f44; }
    #ui {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      font-size: 15px;
      pointer-events: none;
      background: rgba(0,0,0,0.6);
      padding: 6px 20px;
      border: 1px solid #333;
    }
    #ui span { color: #aaa; }
    #ui span b { color: #0f0; }
    #overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }
    #overlay h1 { font-size: 44px; color: #0f0; text-shadow: 0 0 20px #0f0; margin-bottom: 14px; }
    #overlay .sub { font-size: 18px; color: #aaa; margin-bottom: 10px; }
    #overlay .hint { font-size: 14px; color: #555; }
    #version { position: absolute; bottom: 8px; right: 12px; font-size: 11px; color: #333; }
    #wrapper { position: relative; }
    #pause-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 38px;
      height: 38px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #444;
      border-radius: 6px;
      color: #aaa;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: border-color 0.1s, color 0.1s;
    }
    #pause-btn:hover { border-color: #0f0; color: #0f0; }
    #pause-btn.paused { border-color: #ff0; color: #ff0; }
    #mute-btn {
      position: absolute;
      top: 56px;
      right: 10px;
      width: 38px;
      height: 38px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #444;
      border-radius: 6px;
      color: #aaa;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: border-color 0.1s, color 0.1s;
    }
    #mute-btn:hover { border-color: #0f0; color: #0f0; }
    #mute-btn.muted { border-color: #f44; color: #f44; }
  </style>
</head>
<body>
  <div id="outer">
    <div id="group-panel"></div>
    <div id="wrapper">
      <canvas id="game"></canvas>
      <div id="ui">
        <span>SCORE <b id="score">0</b></span>
        <span style="display:none"><b id="lives"></b></span>
        <span>GROUP <b id="wave">1</b></span>
      </div>
      <div id="overlay">
        <h1 id="title">ABC FUN</h1>
        <p class="sub" id="subtitle">Match the glowing letter shown at the bottom!</p>
        <p class="hint">â† â†’ to move &nbsp;|&nbsp; SPACE to launch</p>
        <br>
        <p class="sub" style="color:#0f0">Press SPACE to Start</p>
      </div>
      <button id="pause-btn" title="Pause (P)">⏸</button>
      <button id="mute-btn" title="Mute (M)">🔊</button>
      <div id="version">v1.0.92</div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
